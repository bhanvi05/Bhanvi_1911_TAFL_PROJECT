<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFG Derivation &amp; Parse Tree Generator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap">
</head>
<body>
    <div class="container">
        <h1 class="page-title">CFG Derivation &amp; Parse Tree Generator</h1>

        <div class="input-section">
            <div class="input-row">
                <div class="input-group grammar-input">
                    <label for="grammar">Grammar Rules</label>
                    <div class="symbol-buttons">
                        <span class="symbol-label">Insert:</span>
                        <button type="button" class="btn-symbol" data-symbol="->" title="Arrow">-></button>
                        <button type="button" class="btn-symbol" data-symbol="|" title="Pipe / OR">|</button>
                        <button type="button" class="btn-symbol" data-symbol="ε" title="Epsilon">ε</button>
                    </div>
                    <textarea id="grammar" rows="6" spellcheck="false" placeholder="e.g. S -> aSb | ab">S -> aSb | ab</textarea>
                    <small>Non-terminals: <code>A-Z</code> &nbsp;&middot;&nbsp; Terminals: <code>a-z, 0-9</code> &nbsp;&middot;&nbsp; Epsilon: <code>&epsilon;</code> &nbsp;&middot;&nbsp; One rule per line</small>
                </div>
                <div class="input-group string-input">
                    <label for="target">Input String</label>
                    <input type="text" id="target" value="aabb" spellcheck="false" placeholder="e.g. aabb">
                    <small>The string to derive from the start symbol</small>
                </div>
            </div>

            <div class="examples">
                <span class="examples-label">Try an example:</span>
                <button class="btn-example" data-example="1">a<sup>n</sup>b<sup>n</sup></button>
                <button class="btn-example" data-example="2">Multi-rule</button>
                <button class="btn-example" data-example="3">Palindrome</button>
                <button class="btn-example" data-example="4">Arithmetic</button>
            </div>

            <button id="generate" class="btn-primary">Generate Derivations &amp; Parse Tree</button>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="output" class="output-section hidden">
            <div class="derivations">
                <div class="panel panel-left">
                    <h2> Leftmost Derivation</h2>
                    <div id="leftmost" class="derivation-content"></div>
                </div>
                <div class="panel panel-right">
                    <h2> Rightmost Derivation</h2>
                    <div id="rightmost" class="derivation-content"></div>
                </div>
            </div>
            <div class="panel tree-panel">
                <h2> Parse Tree</h2>
                <div class="canvas-wrapper">
                    <canvas id="parse-tree"></canvas>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Bhanvi &mdash; 2024UCA1911</p>
    </footer>

    <script src="js/grammar.js"></script>
    <script src="js/derivation.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
